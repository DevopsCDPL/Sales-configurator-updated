<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgF" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="skinF" cx="45%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#f0c8a0"/>
      <stop offset="100%" stop-color="#d4a070"/>
    </radialGradient>
    <radialGradient id="skinShadowF" cx="55%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0"/>
      <stop offset="100%" stop-color="#a67848" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="blouseF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8755a"/>
      <stop offset="100%" stop-color="#c4503a"/>
    </linearGradient>
    <linearGradient id="hairGradF" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#5a4030"/>
      <stop offset="40%" stop-color="#3d2b1f"/>
      <stop offset="100%" stop-color="#2a1a0f"/>
    </linearGradient>
    <filter id="softShadowF" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feFlood flood-color="#000" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circleF"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>

  <!-- Background with radial glow -->
  <circle cx="100" cy="100" r="100" fill="url(#bgF)"/>
  <circle cx="85" cy="55" r="50" fill="#fef3c7" opacity="0.15"/>

  <g clip-path="url(#circleF)">
    <!-- Neck -->
    <rect x="83" y="126" width="34" height="28" rx="5" fill="url(#skinF)"/>
    <ellipse cx="100" cy="130" rx="14" ry="3" fill="#b07840" opacity="0.1"/>

    <!-- Top / Blouse -->
    <path d="M28 210 C28 165 55 148 100 145 C145 148 172 165 172 210 Z" fill="url(#blouseF)" filter="url(#softShadowF)"/>
    <!-- Blouse highlight -->
    <path d="M55 168 C62 155 78 148 100 146 C82 150 68 160 58 175Z" fill="#f09080" opacity="0.25"/>
    <!-- Collar / Neckline -->
    <path d="M80 145 Q100 162 120 145 Q114 155 100 160 Q86 155 80 145Z" fill="#d4553a" opacity="0.6"/>
    <path d="M83 147 Q100 158 117 147 Q112 153 100 157 Q88 153 83 147Z" fill="#c4503a" opacity="0.3"/>

    <!-- Face -->
    <ellipse cx="100" cy="92" rx="40" ry="46" fill="url(#skinF)"/>
    <ellipse cx="100" cy="92" rx="40" ry="46" fill="url(#skinShadowF)"/>
    <!-- Face highlight -->
    <ellipse cx="90" cy="78" rx="22" ry="26" fill="#f8d8b0" opacity="0.15"/>

    <!-- Ears -->
    <ellipse cx="60" cy="92" rx="7" ry="10" fill="#d4a070"/>
    <ellipse cx="140" cy="92" rx="7" ry="10" fill="#d4a070"/>
    <!-- Earrings -->
    <circle cx="60" cy="102" r="2.5" fill="#fbbf24" opacity="0.6"/>
    <circle cx="140" cy="102" r="2.5" fill="#fbbf24" opacity="0.6"/>

    <!-- Eye sockets -->
    <ellipse cx="82" cy="82" rx="13" ry="9" fill="#c49060" opacity="0.06"/>
    <ellipse cx="118" cy="82" rx="13" ry="9" fill="#c49060" opacity="0.06"/>

    <!-- Eyes with full detail -->
    <ellipse cx="82" cy="82" rx="9.5" ry="7" fill="white"/>
    <ellipse cx="118" cy="82" rx="9.5" ry="7" fill="white"/>
    <!-- Iris -->
    <circle cx="84" cy="82" r="5.2" fill="#5a3a1a"/>
    <circle cx="120" cy="82" r="5.2" fill="#5a3a1a"/>
    <!-- Pupil -->
    <circle cx="84" cy="82" r="2.8" fill="#1a0a00"/>
    <circle cx="120" cy="82" r="2.8" fill="#1a0a00"/>
    <!-- Eye highlights -->
    <circle cx="86" cy="80" r="2" fill="white" opacity="0.9"/>
    <circle cx="122" cy="80" r="2" fill="white" opacity="0.9"/>
    <circle cx="83" cy="84" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="119" cy="84" r="0.8" fill="white" opacity="0.4"/>
    <!-- Upper eyelid with lashes -->
    <path d="M72 79 Q82 73 92 79" stroke="#3d2b1f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M108 79 Q118 73 128 79" stroke="#3d2b1f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Lash extensions -->
    <path d="M72 79 L70 76" stroke="#3d2b1f" stroke-width="1" stroke-linecap="round"/>
    <path d="M92 79 L94 76" stroke="#3d2b1f" stroke-width="1" stroke-linecap="round"/>
    <path d="M108 79 L106 76" stroke="#3d2b1f" stroke-width="1" stroke-linecap="round"/>
    <path d="M128 79 L130 76" stroke="#3d2b1f" stroke-width="1" stroke-linecap="round"/>
    <!-- Lower eyelid -->
    <path d="M74 85 Q82 89 90 85" stroke="#c49060" stroke-width="0.5" fill="none" opacity="0.3"/>
    <path d="M110 85 Q118 89 126 85" stroke="#c49060" stroke-width="0.5" fill="none" opacity="0.3"/>

    <!-- Eyebrows (thinner, shaped) -->
    <path d="M72 72 Q78 66 84 68 Q89 69 92 72" stroke="#3d2b1f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M108 72 Q111 69 116 68 Q122 66 128 72" stroke="#3d2b1f" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M98 78 L96 93" stroke="#c49060" stroke-width="1.2" fill="none" opacity="0.35"/>
    <path d="M95 95 Q100 100 105 95" stroke="#b07840" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="100" cy="97" rx="5" ry="2.5" fill="#b07840" opacity="0.06"/>

    <!-- Lips with depth -->
    <!-- Upper lip -->
    <path d="M86 106 Q90 102 96 104 Q100 101 104 104 Q110 102 114 106" fill="#c86068"/>
    <!-- Lower lip -->
    <path d="M86 106 Q100 116 114 106" fill="#d87880"/>
    <!-- Lip highlight -->
    <ellipse cx="100" cy="109" rx="6" ry="2" fill="#e8909a" opacity="0.3"/>
    <!-- Lip line -->
    <path d="M88 106 Q100 110 112 106" stroke="#a84850" stroke-width="0.5" fill="none" opacity="0.4"/>

    <!-- Cheek blush -->
    <ellipse cx="68" cy="98" rx="9" ry="5" fill="#e8a090" opacity="0.3"/>
    <ellipse cx="132" cy="98" rx="9" ry="5" fill="#e8a090" opacity="0.3"/>

    <!-- Hair back layer (flowing behind shoulders) -->
    <path d="M45 82 C38 115 38 150 48 185 C44 150 44 115 50 82Z" fill="#2a1a0f"/>
    <path d="M155 82 C162 115 162 150 152 185 C156 150 156 115 150 82Z" fill="#2a1a0f"/>

    <!-- Hair main -->
    <path d="M58 78 C58 36 72 18 100 16 C128 18 142 36 142 78 C140 52 130 35 100 32 C70 35 60 52 58 78Z" fill="url(#hairGradF)"/>
    <!-- Hair top volume -->
    <path d="M62 70 C60 32 76 14 100 12 C124 14 140 32 138 70 C136 44 124 26 100 24 C76 26 64 44 62 70Z" fill="#4a3728"/>
    <!-- Hair shine -->
    <path d="M76 22 C82 16 92 12 100 12 C94 16 84 20 78 28Z" fill="#6a5040" opacity="0.35"/>
    <path d="M74 28 C80 18 92 14 100 13" stroke="#7a6050" stroke-width="1.5" fill="none" opacity="0.2"/>

    <!-- Hair flowing sides -->
    <path d="M55 78 C48 98 44 125 46 155 C50 160 52 158 52 148 C50 125 50 98 58 78Z" fill="#4a3728"/>
    <path d="M145 78 C152 98 156 125 154 155 C150 160 148 158 148 148 C150 125 150 98 142 78Z" fill="#4a3728"/>
    <!-- Side hair over ears -->
    <path d="M56 78 C50 92 46 115 48 140" stroke="#3d2b1f" stroke-width="3" fill="none"/>
    <path d="M144 78 C150 92 154 115 152 140" stroke="#3d2b1f" stroke-width="3" fill="none"/>
    <!-- Hair wave details -->
    <path d="M52 90 C48 105 46 120 48 140" stroke="#2a1a0f" stroke-width="1" fill="none" opacity="0.2"/>
    <path d="M148 90 C152 105 154 120 152 140" stroke="#2a1a0f" stroke-width="1" fill="none" opacity="0.2"/>
    <!-- Hair texture -->
    <path d="M68 38 C72 28 82 22 92 20" stroke="#2a1a0f" stroke-width="0.5" fill="none" opacity="0.15"/>
    <path d="M78 32 C82 24 90 20 98 18" stroke="#2a1a0f" stroke-width="0.5" fill="none" opacity="0.15"/>
    <path d="M112 20 C120 22 128 28 132 38" stroke="#2a1a0f" stroke-width="0.5" fill="none" opacity="0.15"/>
  </g>
</svg>
