<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgM" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="skinM" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#e8b88a"/>
      <stop offset="100%" stop-color="#c8935a"/>
    </radialGradient>
    <radialGradient id="skinShadowM" cx="55%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0"/>
      <stop offset="100%" stop-color="#a67848" stop-opacity="0.3"/>
    </radialGradient>
    <linearGradient id="jacketM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a6fa5"/>
      <stop offset="100%" stop-color="#2c4a7c"/>
    </linearGradient>
    <linearGradient id="hairGradM" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#5a4030"/>
      <stop offset="40%" stop-color="#3d2b1f"/>
      <stop offset="100%" stop-color="#2a1a0f"/>
    </linearGradient>
    <filter id="softShadowM" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feFlood flood-color="#000" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlowM">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="-1"/>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
    <clipPath id="circleM"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>

  <!-- Background with radial glow -->
  <circle cx="100" cy="100" r="100" fill="url(#bgM)"/>
  <circle cx="85" cy="55" r="50" fill="#fef3c7" opacity="0.15"/>

  <g clip-path="url(#circleM)">
    <!-- Neck with shadow -->
    <rect x="80" y="126" width="40" height="32" rx="6" fill="url(#skinM)"/>
    <ellipse cx="100" cy="130" rx="18" ry="4" fill="#b07840" opacity="0.15"/>

    <!-- Shoulders / Jacket -->
    <path d="M30 210 C30 165 55 148 100 145 C145 148 170 165 170 210 Z" fill="url(#jacketM)" filter="url(#softShadowM)"/>
    <!-- Jacket highlight -->
    <path d="M55 165 C65 155 80 149 100 148 C85 152 70 160 60 172Z" fill="#5a80b5" opacity="0.3"/>
    <!-- T-shirt visible at collar -->
    <path d="M84 146 Q100 164 116 146 Q112 157 100 160 Q88 157 84 146Z" fill="#e8e8e8"/>
    <path d="M86 148 Q100 160 114 148 Q110 155 100 158 Q90 155 86 148Z" fill="#f5f5f5"/>
    <!-- Jacket lapels -->
    <path d="M60 160 L84 146 L90 170 Z" fill="#3a5a8a" opacity="0.7"/>
    <path d="M140 160 L116 146 L110 170 Z" fill="#3a5a8a" opacity="0.7"/>

    <!-- Face with depth -->
    <ellipse cx="100" cy="92" rx="42" ry="48" fill="url(#skinM)"/>
    <ellipse cx="100" cy="92" rx="42" ry="48" fill="url(#skinShadowM)"/>
    <!-- Jaw highlight -->
    <ellipse cx="92" cy="78" rx="24" ry="28" fill="#ecc8a0" opacity="0.2"/>

    <!-- Ears with inner detail -->
    <ellipse cx="58" cy="92" rx="8" ry="12" fill="#c49464"/>
    <ellipse cx="59" cy="92" rx="5" ry="8" fill="#b4845a" opacity="0.3"/>
    <ellipse cx="142" cy="92" rx="8" ry="12" fill="#c49464"/>
    <ellipse cx="141" cy="92" rx="5" ry="8" fill="#b4845a" opacity="0.3"/>

    <!-- 5 o'clock shadow base -->
    <path d="M68 100 Q68 140 100 145 Q132 140 132 100 Q128 122 100 130 Q72 122 68 100Z" fill="#3d2b1f" opacity="0.12"/>

    <!-- Beard with depth -->
    <path d="M70 104 Q72 136 100 142 Q128 136 130 104 Q126 120 100 128 Q74 120 70 104Z" fill="#3d2b1f" opacity="0.8"/>
    <path d="M73 107 Q75 133 100 138 Q125 133 127 107 Q124 118 100 124 Q76 118 73 107Z" fill="#4a3728"/>
    <!-- Beard highlight -->
    <path d="M78 110 Q80 125 100 130 Q92 125 85 115Z" fill="#5a4838" opacity="0.3"/>
    <!-- Beard texture lines -->
    <path d="M85 112 L88 125" stroke="#2a1a0f" stroke-width="0.3" opacity="0.2"/>
    <path d="M95 115 L96 130" stroke="#2a1a0f" stroke-width="0.3" opacity="0.2"/>
    <path d="M105 115 L104 130" stroke="#2a1a0f" stroke-width="0.3" opacity="0.2"/>
    <path d="M115 112 L112 125" stroke="#2a1a0f" stroke-width="0.3" opacity="0.2"/>

    <!-- Mustache with shading -->
    <path d="M82 103 Q91 111 100 107 Q109 111 118 103 Q115 109 100 112 Q85 109 82 103Z" fill="#3d2b1f"/>
    <path d="M85 105 Q92 109 100 107 Q108 109 115 105" stroke="#4a3828" stroke-width="0.5" fill="none" opacity="0.5"/>

    <!-- Eye sockets (subtle depth) -->
    <ellipse cx="82" cy="82" rx="14" ry="10" fill="#b07840" opacity="0.08"/>
    <ellipse cx="118" cy="82" rx="14" ry="10" fill="#b07840" opacity="0.08"/>

    <!-- Eyes with detail -->
    <ellipse cx="82" cy="82" rx="9" ry="6.5" fill="white"/>
    <ellipse cx="118" cy="82" rx="9" ry="6.5" fill="white"/>
    <!-- Iris -->
    <circle cx="84" cy="82" r="5" fill="#5a3a1a"/>
    <circle cx="120" cy="82" r="5" fill="#5a3a1a"/>
    <!-- Pupil -->
    <circle cx="84" cy="82" r="2.8" fill="#1a0a00"/>
    <circle cx="120" cy="82" r="2.8" fill="#1a0a00"/>
    <!-- Eye highlights -->
    <circle cx="86" cy="80" r="1.8" fill="white" opacity="0.9"/>
    <circle cx="122" cy="80" r="1.8" fill="white" opacity="0.9"/>
    <circle cx="83" cy="84" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="119" cy="84" r="0.8" fill="white" opacity="0.4"/>
    <!-- Upper eyelid line -->
    <path d="M73 80 Q82 75 91 80" stroke="#3d2b1f" stroke-width="1.5" fill="none"/>
    <path d="M109 80 Q118 75 127 80" stroke="#3d2b1f" stroke-width="1.5" fill="none"/>
    <!-- Lower eyelid subtle -->
    <path d="M74 84 Q82 88 90 84" stroke="#b07840" stroke-width="0.5" fill="none" opacity="0.3"/>
    <path d="M110 84 Q118 88 126 84" stroke="#b07840" stroke-width="0.5" fill="none" opacity="0.3"/>

    <!-- Eyebrows with thickness variation -->
    <path d="M71 73 Q77 67 83 69 Q88 70 92 73" stroke="#3d2b1f" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M108 73 Q112 70 117 69 Q123 67 129 73" stroke="#3d2b1f" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Brow highlight -->
    <path d="M73 72 Q82 68 90 72" stroke="#5a4030" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M110 72 Q118 68 127 72" stroke="#5a4030" stroke-width="1" fill="none" opacity="0.3"/>

    <!-- Nose with bridge and tip -->
    <path d="M98 78 L96 94" stroke="#c49060" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M95 96 Q100 101 105 96" stroke="#b07840" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Nose shadow -->
    <ellipse cx="100" cy="98" rx="6" ry="3" fill="#b07840" opacity="0.08"/>
    <!-- Nostril hints -->
    <circle cx="95" cy="97" r="1.2" fill="#a06838" opacity="0.25"/>
    <circle cx="105" cy="97" r="1.2" fill="#a06838" opacity="0.25"/>

    <!-- Hair with volume and shine -->
    <path d="M55 76 C54 36 72 18 100 16 C128 18 146 36 145 76 C144 55 135 36 100 32 C65 36 56 55 55 76Z" fill="url(#hairGradM)"/>
    <!-- Hair top layer (lighter) -->
    <path d="M60 68 C58 32 76 14 102 12 C130 14 148 36 146 68 C143 44 130 28 102 25 C74 28 62 44 60 68Z" fill="#4a3728"/>
    <!-- Hair shine streak -->
    <path d="M78 24 C82 20 90 16 100 15 C95 18 85 22 80 30Z" fill="#6a5040" opacity="0.4"/>
    <path d="M75 30 C80 22 92 17 100 16" stroke="#7a6050" stroke-width="1.5" fill="none" opacity="0.2"/>
    <!-- Hair texture lines -->
    <path d="M70 40 C72 32 80 24 90 22" stroke="#2a1a0f" stroke-width="0.5" fill="none" opacity="0.15"/>
    <path d="M80 35 C82 28 90 22 98 20" stroke="#2a1a0f" stroke-width="0.5" fill="none" opacity="0.15"/>
    <path d="M110 22 C118 24 126 32 128 40" stroke="#2a1a0f" stroke-width="0.5" fill="none" opacity="0.15"/>
    <!-- Side hair with depth -->
    <path d="M55 76 C52 65 54 52 62 42" stroke="#3d2b1f" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M145 76 C148 65 146 52 138 42" stroke="#3d2b1f" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Temple shading -->
    <path d="M58 75 C56 65 58 55 64 48" stroke="#4a3728" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M142 75 C144 65 142 55 136 48" stroke="#4a3728" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
</svg>
